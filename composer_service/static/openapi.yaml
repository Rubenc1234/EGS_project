openapi: 3.0.0
info:
  title: Composer API (minimal)
  version: 0.1.0
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TransactionRequest:
      type: object
      properties:
        from_wallet:
          type: string
        to_wallet:
          type: string
        amount:
          type: number
        asset:
          type: string
      required: [from_wallet, to_wallet, amount]

    TransactionResponse:
      type: object
      properties:
        tx_id:
          type: string
        hash:
          type: string
        status:
          type: string
        estimated_fee:
          type: string
        created_at:
          type: string

    TransactionItem:
      type: object
      properties:
        tx_id:
          type: string
        hash:
          type: string
        from:
          type: string
        to:
          type: string
        amount:
          type: string
        status:
          type: string
        confirmed_at:
          type: string

    TransactionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionItem'
        total:
          type: integer

    Balance:
      type: object
      properties:
        wallet_id:
          type: string
        symbol:
          type: string
        balance:
          type: string
        balance_in_fiat:
          type: number
        currency:
          type: string
        updated_at:
          type: string

security:
  - BearerAuth: []
paths:
  /v1/composer/login:
    post:
      summary: Login via IAM (delegated to IAM/Keycloak)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        '200':
          description: access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                  active:
                    type: boolean

  /v1/composer/users/{id}:
    get:
      summary: Get user data via IAM
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: user object
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string

  /v1/composer/tokens:
    patch:
      summary: Introspect user token via IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: introspect result
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean

  /v1/composer/payments:
    post:
      summary: Create a payment via composer (for authenticated user)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                amount:
                  type: number
                phone_number:
                  type: string
              required: [user_id, amount]
      responses:
        '201':
          description: payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  user_id:
                    type: string
                  amount:
                    type: number
                  status:
                    type: string
                  stripe_payment_intent_id:
                    type: string

  /v1/composer/payments/{payment_id}:
    get:
      summary: Get a payment by id (composer forwards to payment service)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: payment_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: payment found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  user_id:
                    type: string
                  amount:
                    type: number
                  status:
                    type: string
                  phone_number:
                    type: string
                  stripe_payment_intent_id:
                    type: string

    patch:
      summary: Update payment status via composer
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: payment_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [cancelled, pending, concluded]
              required: [status]
      responses:
        '200':
          description: status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  user_id:
                    type: string
                  amount:
                    type: number
                  status:
                    type: string
                  phone_number:
                    type: string
                  stripe_payment_intent_id:
                    type: string
  
  /v1/composer/notifications:
    post:
      summary: Send a notification via composer (for authenticated callers)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                user_ids:
                  type: array
                  items:
                    type: string
              required: [message, user_ids]
      responses:
        '200':
          description: notifications queued
          content:
            application/json:
              schema:
                type: object
  /v1/composer/events/{userID}:
    get:
      summary: Connect to user's SSE events stream via composer (proxied)
      description: |
        Estabelece uma ligação Server-Sent Events (SSE) para receber notificações em
        tempo real. Use curl ou um cliente SSE — o Swagger UI pode não suportar streaming.
      parameters:
        - name: userID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event:message
                data:hello from server

                event:message
                data:another event

  /v1/composer/transactions:
    post:
      summary: Create a transaction via composer
      description: "This endpoint proxies to the transactions service at POST /v1/transactions/ (composer forwards the request)."
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
            example:
              amount: 30
              asset: "010"
              from_wallet: "1"
              to_wallet: "2"
      responses:
        '200':
          description: transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'

    get:
      summary: List transactions via composer
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: wallet_id
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        '200':
          description: list of transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'

  /v1/composer/transactions/{wallet_id}/balance:
    get:
      summary: Get wallet balance via composer
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: wallet_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Balance'

  /v1/composer/transactions/refund:
    post:
      summary: Request a refund via composer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                original_tx_id:
                  type: string
              required: [original_tx_id]
      responses:
        '200':
          description: refund initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  refund_tx_id:
                    type: string
                  original_tx_id:
                    type: string
                  status:
                    type: string
                  message:
                    type: string

  
  