openapi: 3.0.0
info:
  title: Composer API (minimal)
  version: 0.1.0
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
paths:
  /v1/composer/login:
    post:
      summary: Login via IAM (delegated to IAM/Keycloak)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        '200':
          description: access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                  active:
                    type: boolean

  /v1/composer/users/{id}:
    get:
      summary: Get user data via IAM
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: user object
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string

  /v1/composer/tokens:
    patch:
      summary: Introspect user token via IAM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: introspect result
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
  