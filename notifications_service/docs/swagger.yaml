basePath: /v1
definitions:
  egs-notifications_internal_models.Client:
    properties:
      admin_email:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      notifications_email:
        type: string
      vapid_public_key:
        type: string
    type: object
  internal_handlers.Action:
    properties:
      action:
        type: string
      action_url:
        type: string
      icon:
        type: string
      title:
        type: string
    type: object
  internal_handlers.ClientTokenRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  internal_handlers.CreateClientRequest:
    properties:
      admin_email:
        type: string
      name:
        type: string
      notifications_email:
        type: string
    required:
    - admin_email
    - name
    - notifications_email
    type: object
  internal_handlers.EmailConfig:
    properties:
      dynamic_data:
        additionalProperties: true
        type: object
      template_id:
        type: string
    required:
    - template_id
    type: object
  internal_handlers.NotificationPayload:
    properties:
      actions:
        items:
          $ref: '#/definitions/internal_handlers.Action'
        type: array
      badge:
        type: string
      dir:
        enum:
        - auto
        - ltr
        - rtl
        type: string
      email:
        allOf:
        - $ref: '#/definitions/internal_handlers.EmailConfig'
        description: Added for Omnichannel Routing
      icon:
        type: string
      image:
        type: string
      lang:
        type: string
      message:
        type: string
      renotify:
        type: boolean
      requireInteraction:
        type: boolean
      silent:
        type: boolean
      tag:
        type: string
      timestamp:
        type: integer
      title:
        type: string
      url:
        type: string
      user_ids:
        items:
          type: string
        minItems: 1
        type: array
      vibrate:
        items:
          type: integer
        type: array
    required:
    - message
    - user_ids
    type: object
  internal_handlers.PushSubscriptionRequest:
    properties:
      endpoint:
        type: string
      keys:
        properties:
          auth:
            type: string
          p256dh:
            type: string
        required:
        - auth
        - p256dh
        type: object
    required:
    - endpoint
    - keys
    type: object
  internal_handlers.SetUserEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  internal_handlers.UnsubscribeRequest:
    properties:
      endpoint:
        type: string
    required:
    - endpoint
    type: object
info:
  contact: {}
  description: Multi-Tenant Web Push Notifications Service
  title: Notifications API
  version: "1.0"
paths:
  /admin/clients:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/egs-notifications_internal_models.Client'
            type: array
      security:
      - MasterAuth: []
      summary: List all clients
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Registers a new client app and generates their forever API Key.
        This raw key is returned ONLY ONCE.
      parameters:
      - description: Client Name and Admin Email
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - MasterAuth: []
      summary: Create a new client tenant
      tags:
      - admin
  /admin/clients/{id}:
    delete:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - MasterAuth: []
      summary: Revoke and delete client
      tags:
      - admin
  /admin/clients/{id}/key:
    patch:
      description: Revokes the old API key and generates a new one. The old key will
        immediately stop working.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - MasterAuth: []
      summary: Regenerate client API Key
      tags:
      - admin
  /auth/token:
    post:
      consumes:
      - application/json
      description: Generates a JWT for the frontend browser and returns the VAPID
        Public Key required to prompt Web Push.
      parameters:
      - description: User ID Payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.ClientTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: token, expires_in, vapid_public_key
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Generate Subscriber Token
      tags:
      - auth
  /events:
    post:
      consumes:
      - application/json
      description: Broadcasts a notification via the browser Push API to specified
        users.
      parameters:
      - description: Notification payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.NotificationPayload'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Send a Web Push notification
      tags:
      - events
  /events/agent.js:
    get:
      description: 'IMPORTANT: Composers MUST proxy this file so it is served from
        their own domain, or browsers will block registration.'
      produces:
      - application/javascript
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Get Web Agent Script
      tags:
      - events
  /events/subscribe:
    delete:
      consumes:
      - application/json
      description: Deletes a Web Push Subscription object, usually called on user
        logout.
      parameters:
      - description: Unsubscribe payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.UnsubscribeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Unsubscribe from Web Push
      tags:
      - events
    post:
      consumes:
      - application/json
      description: Saves a Web Push Subscription object from the browser.
      parameters:
      - description: Push Subscription object
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.PushSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Subscribe to Web Push
      tags:
      - events
  /info:
    get:
      description: Returns the client's name and VAPID public key. Useful if the composer
        wants to cache or hardcode their VAPID key instead of fetching it on every
        token request.
      produces:
      - application/json
      responses:
        "200":
          description: name, vapid_public_key
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get client information
      tags:
      - client
  /users/{user_id}/email:
    delete:
      description: Deletes a user's notification email for the authenticated client.
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete user notification email
      tags:
      - users
    get:
      description: Retrieves a user's notification email for the authenticated client.
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user notification email
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Creates or updates a user's notification email for the authenticated
        client.
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      - description: Email payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.SetUserEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Set user notification email
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: 'Composer API Key OR 4-hour Subscriber JWT (Format: Bearer <token>)'
    in: header
    name: Authorization
    type: apiKey
  MasterAuth:
    description: 'Master Admin Secret for platform management (Format: Bearer <secret>)'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
