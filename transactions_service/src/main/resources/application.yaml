server:
  port: 8081

spring:
  application:
    name: transaction-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/transaction_db
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ────────────────────────────────────────────
# BLOCKCHAIN PROVIDER CONFIGURATION
# ────────────────────────────────────────────
# 
# Fase de Desenvolvimento:
#   spring.profiles.active=mock
#   blockchain.provider=mock
#
# Fase de Produção (Real):
#   spring.profiles.active=prod
#   blockchain.provider=real
#
blockchain:
  provider: real  # <- TEM: mock
  
  node:
    url: ${BLOCKCHAIN_NODE_URL}
    chainId: 11155111  # Ethereum Sepolia Testnet

# Keycloak / OIDC settings used for Composer login flow
keycloak:
  url: "http://keycloak.pt"
  public-url: "http://keycloak.pt"
  realm: "microservices"
  client-id: "iam-service"
  client-secret: "4g70qaoXmfnaIf7d9LgSRtnJCjIBBcha"

# Application settings
app:
  dev-mode: false  # ← DESATIVADO: MockBlockchainProvider faz o que dev-mode fazia
  bank-wallet: "0x86a9906e6bd2ef137d6d5339154611de7a41b178"  # Bank's wallet
  payment-service-url: "http://localhost:5002"
  internal-api-key: "test-key-12345"
  
  # Transaction/Fee Settings
  transaction:
    fee-percentage: 2.0  # Taxa: 2% em cada transação
    fee-recipient: "0x86a9906e6bd2ef137d6d5339154611de7a41b178"  # Bank's wallet (where fees go)
