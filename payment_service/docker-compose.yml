version: '3.8'
services:
  payment-postgres:
    image: postgres:15
    container_name: payment-postgres
    environment:
      POSTGRES_USER: payuser
      POSTGRES_PASSWORD: paypassword
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment_pgdata:/var/lib/postgresql/data

  payment-keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: payment-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8083
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "8083:8080"
    volumes:
      - payment_keycloak_data:/opt/keycloak/data

  payment-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: payment-backend
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://payuser:paypassword@payment-postgres:5432/payment_db
      PAYMENT_KEYCLOAK_URL: http://payment-keycloak:8080
      PAYMENT_KEYCLOAK_PUBLIC_URL: http://localhost:8083
      TRANSACTIONS_SERVICE_URL: http://host.docker.internal:8081
    depends_on:
      - payment-postgres
      - payment-keycloak
    extra_hosts:
      - "host.docker.internal:host-gateway"

  payment-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: payment-frontend
    ports:
      - "5174:5174"
    environment:
      VITE_PROXY_TARGET: http://payment-backend:5002
    depends_on:
      - payment-backend

  payment-stripe-cli:
    image: stripe/stripe-cli
    container_name: payment-stripe-cli
    command: >
      listen
      --api-key ${STRIPE_Secret_key}
      --forward-to http://payment-backend:5002/v1/payments/webhook
      --skip-verify
    depends_on:
      - payment-backend

volumes:
  payment_pgdata:
  payment_keycloak_data:
