openapi: 3.0.0
info:
  title: Payment Service
  description: Serviço responsável por criar e gerir pagamentos via Stripe.
  version: 1.0.0

servers:
  - url: http://127.0.0.1:5002
    description: Servidor local
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/egs-74e/EGS-payment/1.0.0

components:

  securitySchemes:
    ServiceToken:
      type: http
      scheme: bearer

  schemas:

    Payment:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [cancelled, pending, concluded]
        to_wallet:
          type: string
        phone_number:
          type: string
          description: "Telefone opcional do pagador"
        stripe_payment_intent_id:
          type: string
          description: "Stripe PaymentIntent ID (pi_...)"

    CreatePayment:
      type: object
      required: [user_id, amount, to_wallet]
      properties:
        user_id:
          type: string
        amount:
          type: number
        to_wallet:
          type: string
        phone_number:
          type: string
          description: "Telefone opcional do pagador"

    UpdatePaymentStatus:
      type: object
      properties:
        status:
          type: string
          enum: [cancelled, pending, concluded]

paths:

  /v1/payments:
    post:
      summary: Cria pagamento via Stripe
      security:
        - ServiceToken: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePayment'
      responses:
        '201':
          description: Pagamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /v1/payments/{payment_id}:
    get:
      summary: Consulta pagamento
      security:
        - ServiceToken: []
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pagamento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

    patch:
      summary: Atualiza estado do pagamento
      security:
        - ServiceToken: []
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentStatus'
      responses:
        '200':
          description: Estado atualizado

  /v1/payments/{payment_id}/receipt:
    get:
      summary: Descarrega recibo do pagamento em PDF
      security:
        - ServiceToken: []
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ficheiro PDF com o recibo
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Pagamento não encontrado

  /v1/payments/webhook:
    post:
      summary: Webhook Stripe (payment_intent.succeeded / payment_intent.payment_failed)
      description: |
        Recebe eventos do Stripe. Autenticação feita via assinatura HMAC no header
        `Stripe-Signature` — não usa Bearer token.
        Ao receber `payment_intent.succeeded`, marca o pagamento como `concluded`
        e envia notificação. Ao receber `payment_intent.payment_failed`, marca como `cancelled`.
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
          description: Assinatura HMAC gerada pelo Stripe para verificação do payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payload do evento Stripe (estrutura variável por tipo de evento)
      responses:
        '200':
          description: Evento processado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          description: Payload inválido ou assinatura incorreta